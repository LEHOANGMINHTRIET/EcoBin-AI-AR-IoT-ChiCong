<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoBin - AI - AR - IoT - ChiCong</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            font-family: 'Lato', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .main-card {
            background: white;
            width: 1100px;
            height: 700px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            padding: 40px;
            display: flex;
            flex-direction: column;
            border: 4px solid #a5d6a7;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header-title h1 {
            font-family: 'Poppins', sans-serif;
            color: #2e7d32;
            font-size: 36px;
            margin: 0;
        }
        .header-title p {
            color: #66bb6a;
            margin: 5px 0 0 0;
            font-weight: bold;
        }
        .arduino-status {
            background: #f1f8e9;
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #c5e1a5;
        }
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
            flex-grow: 1;
        }
        .info-panel { display: flex; flex-direction: column; gap: 20px; }
        .level-card {
            background: #2e7d32;
            color: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }
        .level-card h2 { margin: 0; font-family: 'Poppins'; font-size: 32px; }
        .mission-card {
            background: #fff9c4;
            border-left: 10px solid #fbc02d;
            padding: 20px;
            border-radius: 0 20px 20px 0;
            text-align: left;
        }
        .mission-card h3 { color: #f57f17; margin: 0 0 10px 0; font-size: 16px; }
        .mission-card p { font-size: 18px; font-weight: 700; margin: 0; color: #333; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .stat-item {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
        }
        .stat-value { font-size: 40px; font-weight: 900; color: #2e7d32; display: block; }
        .stat-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .camera-panel {
            background: #ffffff;
            border: 3px solid #81c784;
            border-radius: 25px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .video-container {
            width: 100%;
            height: 320px;
            background: #263238;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            border: 6px solid #37474f;
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .scan-line {
            position: absolute;
            top: 10%;
            left: 0;
            width: 100%;
            height: 4px;
            background: #00e676;
            box-shadow: 0 0 15px #00e676;
            animation: moveScan 3s infinite linear;
            z-index: 10;
        }
        @keyframes moveScan {
            0%, 100% { top: 15%; }
            50% { top: 85%; }
        }
        .btn-main {
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            color: white; border: none; padding: 15px 40px; border-radius: 50px;
            font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(46,125,50,0.2);
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(46,125,50,0.3); }
        #btn-toggle-cam {
            background: #616161; color: white; border: none; padding: 8px 15px;
            border-radius: 20px; cursor: pointer; font-size: 13px;
        }
        #ai-result {
            background: #e3f2fd; color: #1565c0; padding: 15px;
            border-radius: 12px; font-weight: bold; font-size: 18px;
            border: 1px solid #bbdefb;
        }
        .alert-box {
            padding: 10px; border-radius: 10px; font-weight: bold;
            background: #f5f5f5; border: 1px solid #ddd;
        }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-color: #c8e6c9; }
        .alert-wrong { background: #ffebee; color: #c62828; border-color: #ffcdd2; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <div class="header-title">
            <h1>HÀNH TRÌNH XANH LÂM ĐỒNG</h1>
            <p>MÔ HÌNH THÔNG MINH AI - AR - IOT | TRƯỜNG THCS CHÍ CÔNG</p>
        </div>
        <div class="arduino-status">
            <button onclick="ketNoiArduino()" style="background:#4caf50; color:white; border:none; padding:8px 15px; border-radius:20px; cursor:pointer; font-weight:bold;">
                🔌 Kết nối Thùng Rác
            </button>
            <span id="status" style="color:#d32f2f; font-weight:bold;">Chưa kết nối ❌</span>
        </div>
    </div>

    <div class="content-grid">
        <div class="info-panel">
            <div class="level-card">
                <h2 id="current-level">CẤP ĐỘ: 1</h2>
            </div>
            
            <div class="mission-card">
                <h3>🎯 NHIỆM VỤ HIỆN TẠI:</h3>
                <p id="mission">Hãy kết nối phần cứng hoặc bấm Bắt đầu để chơi thử!</p>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">Điểm số</span>
                    <span id="score" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Thời gian</span>
                    <span class="stat-value"><span id="timer">45</span>s</span>
                </div>
            </div>

            <div id="game-alert" class="alert-box">Hệ thống đang sẵn sàng...</div>
        </div>

        <div class="camera-panel">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:bold; color:#2e7d32;">📷 CAMERA NHẬN DIỆN AR</span>
                <button id="btn-toggle-cam" onclick="batTatCamera()">📷 Tắt Camera</button>
            </div>
            
            <div class="video-container">
                <video id="webcam" autoplay playsinline muted></video>
                <div class="scan-line"></div>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:70%; height:70%; border:2px dashed #00e676; border-radius:20px; pointer-events:none;"></div>
            </div>

            <div id="ai-result">Đang khởi động AI...</div>
        </div>
    </div>

    <div style="margin-top: 30px;">
        <button id="btn-start" class="btn-main" onclick="batDauGame()">
            🎮 BẮT ĐẦU THỬ THÁCH
        </button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
