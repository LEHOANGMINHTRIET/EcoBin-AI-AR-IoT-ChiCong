<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoBin - AI - AR - IoT - ChiCong</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            font-family: 'Lato', sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .main-card {
            background: white;
            width: 1280px;
            height: 760px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            padding: 25px;
            display: flex;
            flex-direction: column;
            border: 4px solid #a5d6a7;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .header-title h1 {
            font-family: 'Poppins', sans-serif;
            color: #2e7d32; font-size: 28px; margin: 0;
        }
        .header-title p { color: #66bb6a; margin: 3px 0 0 0; font-weight: bold; font-size: 13px;}
        
        .arduino-status {
            background: #f1f8e9; padding: 8px 15px; border-radius: 50px;
            display: flex; align-items: center; gap: 10px; border: 1px solid #c5e1a5;
        }
        
        .content-grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr; /* Cân bằng giữa Khung Game đồ họa và Khung Camera */
            gap: 25px;
            flex-grow: 1;
            height: calc(100% - 120px);
        }
        
        /* KHU VỰC KHUNG GAME ĐỒ HỌA TRỰC QUAN */
        .game-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #ffffff;
            border: 3px solid #4caf50;
            border-radius: 20px;
            padding: 15px;
        }
        .game-canvas-wrapper {
            width: 100%;
            flex-grow: 1;
            background: #e0f2f1; /* Màu nền công viên xanh dịu */
            border-radius: 15px;
            border: 3px solid #004d40;
            position: relative;
            overflow: hidden;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* KHU VỰC KHUNG CAMERA AI */
        .camera-panel {
            background: #ffffff; border: 3px solid #81c784;
            border-radius: 20px; padding: 15px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .video-container {
            width: 100%;
            flex-grow: 1;
            background: #263238;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            border: 4px solid #37474f;
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Khung nét đứt quét rác */
        .scan-overlay-large {
            position: absolute;
            top: 8%; left: 8%; width: 84%; height: 84%;
            border: 4px dashed #00e676; border-radius: 15px;
            pointer-events: none; z-index: 5;
        }
        .scan-line {
            position: absolute; top: 8%; left: 8%; width: 84%; height: 4px;
            background: #00e676; box-shadow: 0 0 15px #00e676;
            animation: moveScanLarge 3s infinite linear; z-index: 6;
        }
        @keyframes moveScanLarge {
            0%, 100% { top: 9%; }
            50% { top: 91%; }
        }

        /* KHU VỰC THÔNG SỐ ĐIỂM SỐ NẰM GỌN PHÍA DƯỚI */
        .status-bar-bottom {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            gap: 15px;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 12px;
            font-weight: bold;
        }
        
        .btn-main {
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            color: white; border: none; padding: 12px 35px; border-radius: 50px;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 6px 15px rgba(46,125,50,0.2); width: 250px;
        }
        .btn-main:hover { transform: translateY(-2px); }
        #btn-toggle-cam {
            background: #616161; color: white; border: none; padding: 6px 12px;
            border-radius: 20px; cursor: pointer; font-size: 12px;
        }
        #ai-result {
            background: #fff3e0; color: #e65100; padding: 10px;
            border-radius: 10px; font-weight: bold; font-size: 15px; border: 1px solid #ffe0b2;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <div class="header-title">
            <h1>HÀNH TRÌNH XANH LÂM ĐỒNG</h1>
            <p>MÔ HÌNH THÔNG MINH AI - AR - IOT | TRƯỜNG THCS CHÍ CÔNG</p>
        </div>
        <div class="arduino-status">
            <button onclick="ketNoiArduino()" style="background:#4caf50; color:white; border:none; padding:6px 12px; border-radius:20px; cursor:pointer; font-weight:bold; font-size:12px;">
                🔌 Kết nối Thùng Rác
            </button>
            <span id="status" style="color:#d32f2f; font-weight:bold; font-size:13px;">Chưa kết nối ❌</span>
        </div>
    </div>

    <div class="content-grid">
        <div class="game-panel">
            <div style="font-weight:bold; color:#1b5e20; font-size:16px;"><i class="fa-solid fa-gamepad"></i> THẾ GIỚI GAME PHÂN LOẠI RÁC ẢO</div>
            <div class="game-canvas-wrapper">
                <canvas id="gameCanvas"></canvas>
            </div>
            
            <div class="status-bar-bottom">
                <div style="color:#2e7d32;" id="current-level">CẤP ĐỘ: 1</div>
                <div style="color:#1565c0;">ĐIỂM: <span id="score">0</span></div>
                <div style="color:#c62828;">THỜI GIAN: <span id="timer">45</span>s</div>
            </div>
            <div id="mission" style="background:#fff9c4; padding:8px; border-radius:8px; font-size:13px; text-align:center; font-weight:bold; border-left:5px solid #fbc02d;">
                Bấm Bắt đầu để trải nghiệm game tương tác AI thực tế!
            </div>
        </div>

        <div class="camera-panel">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:bold; color:#2e7d32; font-size:15px;"><i class="fa-solid fa-camera"></i> CAMERA TRÍ TUỆ NHÂN TẠO (AI)</span>
                <button id="btn-toggle-cam" onclick="batTatCamera()">📷 Tắt Camera</button>
            </div>
            
            <div class="video-container">
                <video id="webcam" autoplay playsinline muted></video>
                <div class="scan-overlay-large"></div>
                <div class="scan-line"></div>
            </div>

            <div id="ai-result">Đang đợi kết quả quét ảnh từ camera...</div>
        </div>
    </div>

    <div style="margin-top: 15px; text-align: left;">
        <button id="btn-start" class="btn-main" onclick="batDauGame()">
            🎮 BẮT ĐẦU THỬ THÁCH
        </button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
